# Scheduled weekly security scan — every Sunday at 02:00 UTC.
# Scans Docker images in ECR, K8s manifests for misconfigurations, and repo for secrets.

name: "Security Scan — Weekly"

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  # ── Scan Docker images already in ECR ──────────────────────────────────────
  scan-images:
    name: Trivy — ECR Image Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - target-app
          - chaos-engine
          - load-tester
          - dashboard

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull latest image from ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull "${REGISTRY}/chaos-platform/${{ matrix.service }}:latest" || {
            echo "Image not found — skipping (may not be built yet)."
            exit 0
          }

      - name: Trivy — scan ECR image for ALL severities
        uses: aquasecurity/trivy-action@0.18.0
        with:
          scan-type:    image
          image-ref:    "${{ steps.login-ecr.outputs.registry }}/chaos-platform/${{ matrix.service }}:latest"
          severity:     "CRITICAL,HIGH,MEDIUM"
          format:       sarif
          output:       "trivy-image-${{ matrix.service }}.sarif"
          exit-code:    "0"   # Don't fail; report only — alert is in the summary job

      - name: Upload image scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-${{ matrix.service }}-${{ github.run_id }}
          path: trivy-image-${{ matrix.service }}.sarif
          retention-days: 90

  # ── Scan K8s manifests for misconfigurations ────────────────────────────────
  scan-manifests:
    name: Trivy — K8s Misconfiguration Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy config scan — all k8s YAML files (HIGH+CRITICAL fails)
        uses: aquasecurity/trivy-action@0.18.0
        with:
          scan-type:  config
          scan-ref:   "."
          severity:   "HIGH,CRITICAL"
          exit-code:  "1"
          format:     table
          skip-dirs:  ".git,node_modules"

      - name: Trivy config scan — SARIF for all severities
        uses: aquasecurity/trivy-action@0.18.0
        with:
          scan-type:  config
          scan-ref:   "."
          format:     sarif
          output:     trivy-config.sarif
          exit-code:  "0"
          skip-dirs:  ".git,node_modules"

      - name: Upload config scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-config-${{ github.run_id }}
          path: trivy-config.sarif
          retention-days: 90

  # ── Scan repo for exposed secrets ──────────────────────────────────────────
  scan-secrets:
    name: Gitleaks — Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history for accurate scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Only needed for org repos

  # ── Post consolidated summary to Slack ─────────────────────────────────────
  notify:
    name: Post Summary to Slack
    runs-on: ubuntu-latest
    needs: [scan-images, scan-manifests, scan-secrets]
    if: always()   # Always post result, even if scans failed

    steps:
      - name: Build and post Slack summary
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          IMAGES_STATUS="${{ needs.scan-images.result }}"
          MANIFESTS_STATUS="${{ needs.scan-manifests.result }}"
          SECRETS_STATUS="${{ needs.scan-secrets.result }}"

          COLOR="good"
          if [[ "$IMAGES_STATUS" == "failure" || "$MANIFESTS_STATUS" == "failure" || "$SECRETS_STATUS" == "failure" ]]; then
            COLOR="danger"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "attachments": [{
              "color": "${COLOR}",
              "title": "Weekly Security Scan — Chaos Platform",
              "fields": [
                {"title": "ECR Image Scan",       "value": "${IMAGES_STATUS}",   "short": true},
                {"title": "K8s Misconfiguration", "value": "${MANIFESTS_STATUS}", "short": true},
                {"title": "Secret Detection",     "value": "${SECRETS_STATUS}",  "short": true},
                {"title": "Run",                  "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
              ]
            }]
          }
          EOF
          )

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK"
