apiVersion: v1
kind: ConfigMap
metadata:
  name: load-tester-config
  namespace: load-tester
  labels:
    app: load-tester
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "dev"
  APP_VERSION: "1.0.0"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka:9092"
  REDIS_URL: "redis://redis.redis:6379/0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  CORS_ORIGINS: "*"
  DB_POOL_SIZE: "5"
  DB_ECHO: "false"
  THINK_TIME_MS: "100"
