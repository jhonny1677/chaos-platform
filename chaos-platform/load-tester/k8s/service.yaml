apiVersion: v1
kind: Service
metadata:
  name: load-tester
  namespace: load-tester
  labels:
    app: load-tester
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9092"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: load-tester
  ports:
    - name: http
      port: 8002
      targetPort: 8002
    - name: metrics
      port: 9092
      targetPort: 9092
  type: ClusterIP
