---
# HPA for the main load-tester API deployment.
# CPU-based: if the API is getting hammered by many test-creation requests, scale out.
# Worker autoscaling is handled by KEDA (keda-scaledobject.yaml), not this HPA.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: load-tester-hpa
  namespace: load-tester
  labels:
    app: load-tester
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: load-tester

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
