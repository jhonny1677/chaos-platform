apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-tester
  namespace: load-tester
  labels:
    app: load-tester
spec:
  replicas: 2
  selector:
    matchLabels:
      app: load-tester
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: load-tester
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: load-tester
          image: load-tester:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
            - name: metrics
              containerPort: 9092
          envFrom:
            - configMapRef:
                name: load-tester-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  # SECRET_REF: kubectl create secret generic load-tester-db \
                  #   --from-literal=url='postgresql+asyncpg://user:REPLACE_WITH_DB_PASSWORD@host:5432/load_tester' \
                  #   -n load-tester
                  name: load-tester-db
                  key: url
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["load-tester"]
                topologyKey: kubernetes.io/hostname
