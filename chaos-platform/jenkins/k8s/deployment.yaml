apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
spec:
  serviceName: jenkins
  replicas: 1   # Jenkins controller must be a singleton
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
      annotations:
        # Reload JCasC on pod restart
        checksum/config: "placeholder-update-on-config-change"
    spec:
      serviceAccountName: jenkins
      securityContext:
        runAsUser:  1000   # jenkins user in the official image
        fsGroup:   1000

      initContainers:
        # Fix permissions on JENKINS_HOME so jenkins user can write
        - name: init-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/jenkins_home"]
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home

      containers:
        - name: jenkins
          image: chaos-platform/jenkins:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50000
              name: agent

          resources:
            requests:
              cpu:    500m
              memory: 1Gi
            limits:
              cpu:    "2"
              memory: 4Gi

          env:
            # Load non-sensitive config from ConfigMap
            - name: JENKINS_URL
              valueFrom:
                configMapKeyRef:
                  name: jenkins-env
                  key:  JENKINS_URL
            - name: CHAOS_API_URL
              valueFrom:
                configMapKeyRef:
                  name: jenkins-env
                  key:  CHAOS_API_URL
            - name: LOADTEST_API_URL
              valueFrom:
                configMapKeyRef:
                  name: jenkins-env
                  key:  LOADTEST_API_URL
            - name: SLACK_TEAM_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: jenkins-env
                  key:  SLACK_TEAM_DOMAIN
            - name: GITHUB_USER
              valueFrom:
                configMapKeyRef:
                  name: jenkins-env
                  key:  GITHUB_USER
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: jenkins-env
                  key:  AWS_REGION

            # Sensitive values from Secret (create separately — not in git)
            # SECRET_REF: kubectl create secret generic jenkins-secrets -n jenkins \
            #   --from-literal=JENKINS_ADMIN_PASSWORD=... \
            #   --from-literal=GITHUB_PAT=... \
            #   --from-literal=SLACK_WEBHOOK_URL=... \
            #   --from-literal=AWS_ACCESS_KEY_ID=... \
            #   --from-literal=AWS_SECRET_ACCESS_KEY=...
            - name: JENKINS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jenkins-secrets
                  key:  JENKINS_ADMIN_PASSWORD
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: jenkins-secrets
                  key:  GITHUB_PAT
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: jenkins-secrets
                  key:  SLACK_WEBHOOK_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: jenkins-secrets
                  key:  AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: jenkins-secrets
                  key:  AWS_SECRET_ACCESS_KEY

          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home

          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10

      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-home
