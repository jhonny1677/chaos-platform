# Jenkins Configuration as Code (JCasC).
# Applied automatically at startup via CASC_JENKINS_CONFIG env var.
# All secrets come from environment variables — never hardcoded here.

jenkins:
  systemMessage: |
    ⚡ Chaos Platform Jenkins
    Managed entirely by Configuration as Code.
    Do NOT make changes through the UI — they will be overwritten on restart.

  # All builds run as ephemeral Kubernetes pods — controller has no executors
  numExecutors: 0
  mode: EXCLUSIVE
  quietPeriod: 5

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          name: Administrator
          # SECRET_REF: set JENKINS_ADMIN_PASSWORD environment variable
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # ── Kubernetes cloud — ephemeral build pods ─────────────────────────────────
  clouds:
    - kubernetes:
        name: kubernetes
        # Empty serverUrl = use in-cluster pod credentials automatically
        serverUrl: ""
        namespace: jenkins
        jenkinsUrl: "http://jenkins.jenkins:8080"
        jenkinsTunnel: "jenkins-agent.jenkins:50000"
        maxRequestsPerHost: 64
        retentionTimeout: 5
        podRetention: "never"    # Always delete pods after build completes
        containerCapStr: "20"

        templates:
          # Default JNLP agent — used for most pipeline stages
          - name: jnlp-agent
            label: jnlp
            nodeUsageMode: NORMAL
            serviceAccount: jenkins
            containers:
              - name: jnlp
                image: "jenkins/inbound-agent:latest-jdk17"
                resourceRequestCpu:    "200m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu:      "500m"
                resourceLimitMemory:   "512Mi"

          # Python agent for chaos experiment and load test jobs
          - name: python-agent
            label: python
            nodeUsageMode: NORMAL
            serviceAccount: jenkins
            containers:
              - name: jnlp
                image: "jenkins/inbound-agent:latest-jdk17"
                resourceRequestCpu:    "100m"
                resourceRequestMemory: "128Mi"
              - name: python
                image: "python:3.11-slim"
                command: "sleep"
                args: "infinity"
                resourceRequestCpu:    "300m"
                resourceRequestMemory: "512Mi"
                resourceLimitCpu:      "1000m"
                resourceLimitMemory:   "1Gi"

          # AWS agent — has AWS CLI and kubectl pre-installed
          - name: aws-agent
            label: aws
            nodeUsageMode: NORMAL
            serviceAccount: jenkins
            containers:
              - name: jnlp
                image: "jenkins/inbound-agent:latest-jdk17"
                resourceRequestCpu:    "200m"
                resourceRequestMemory: "256Mi"
              - name: awscli
                image: "amazon/aws-cli:latest"
                command: "sleep"
                args: "infinity"
                resourceRequestCpu:    "100m"
                resourceRequestMemory: "128Mi"

# ── Credentials ────────────────────────────────────────────────────────────────
credentials:
  system:
    domainCredentials:
      - credentials:
          # Slack webhook URL for notifications
          - string:
              scope: GLOBAL
              id: slack-webhook
              description: "Slack incoming webhook URL"
              # SECRET_REF: set SLACK_WEBHOOK_URL environment variable
              secret: "${SLACK_WEBHOOK_URL}"

          # GitHub credentials for API calls and repo operations
          - usernamePassword:
              scope: GLOBAL
              id: github-credentials
              description: "GitHub username + PAT"
              # SECRET_REF: set GITHUB_USER and GITHUB_PAT environment variables
              username: "${GITHUB_USER}"
              password: "${GITHUB_PAT}"

          # AWS credentials for ECR push and EKS access
          - aws:
              scope: GLOBAL
              id: aws-credentials
              description: "AWS access key for ECR and EKS"
              # SECRET_REF: set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY env vars
              accessKey: "${AWS_ACCESS_KEY_ID}"
              secretKey: "${AWS_SECRET_ACCESS_KEY}"

          # Chaos Engine API URL
          - string:
              scope: GLOBAL
              id: chaos-api-url
              description: "Chaos Engine REST API base URL"
              secret: "${CHAOS_API_URL:-http://chaos-engine.chaos-engine:8001}"

          # Load Tester API URL
          - string:
              scope: GLOBAL
              id: loadtest-api-url
              description: "Load Tester REST API base URL"
              secret: "${LOADTEST_API_URL:-http://load-tester.load-tester:8002}"

# ── Seed job — creates all jobs from Groovy DSL files ─────────────────────────
jobs:
  - script: >
      pipelineJob('_seed') {
        description 'Seed job: reads jenkins/jobs/*.groovy and creates all pipeline jobs.'
        triggers { cron('H/30 * * * *') }
        definition {
          cps {
            sandbox true
            script('''
              pipeline {
                agent { label 'jnlp' }
                stages {
                  stage('Seed') {
                    steps {
                      checkout scm
                      jobDsl(
                        targets: 'chaos-platform/jenkins/jobs/*.groovy',
                        removedJobAction: 'IGNORE',
                        removedViewAction: 'IGNORE',
                        sandbox: true
                      )
                    }
                  }
                }
              }
            ''')
          }
        }
      }

# ── Unclassified (global) settings ────────────────────────────────────────────
unclassified:
  location:
    # SECRET_REF: set JENKINS_URL environment variable (e.g. http://jenkins.chaos-platform.local)
    url: "${JENKINS_URL:-http://jenkins.jenkins:8080}"
    adminAddress: "admin@chaos-platform.local"

  slackNotifier:
    # SECRET_REF: set SLACK_TEAM_DOMAIN environment variable
    teamDomain: "${SLACK_TEAM_DOMAIN}"
    tokenCredentialId: slack-webhook
    room: "#chaos-platform-ci"
    baseUrl: "https://hooks.slack.com/services/"

  gitHubPluginConfig:
    configs:
      - name: github
        credentialsId: github-credentials
        manageHooks: false
