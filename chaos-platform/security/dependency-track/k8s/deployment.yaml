apiVersion: apps/v1
kind: Deployment
metadata:
  name: dependency-track
  namespace: security
  labels:
    app: dependency-track
    app.kubernetes.io/part-of: chaos-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dependency-track
  template:
    metadata:
      labels:
        app:                         dependency-track
        version:                     "4.11"
        app.kubernetes.io/part-of:   chaos-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: dependency-track
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        fsGroup:      1000

      containers:
        - name: dependency-track
          # Bundled image includes both the API Server and the frontend
          image: dependencytrack/bundled:4.11.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          resources:
            requests:
              cpu:    500m
              memory: 2Gi    # Dependency Track is Java — needs significant heap
            limits:
              cpu:    2000m
              memory: 4Gi

          env:
            - name: ALPINE_DATABASE_MODE
              value: "embedded"   # H2 for dev. For production use PostgreSQL:
                                  # set to "external" and configure below
            - name: ALPINE_DATA_DIRECTORY
              value: "/data"
            - name: ALPINE_CORS_ENABLED
              value: "true"
            - name: ALPINE_CORS_ALLOW_ORIGIN
              value: "*"   # restrict to your domain in production
            # ── Production PostgreSQL (uncomment when ready) ──────────────────
            # - name: ALPINE_DATABASE_URL
            #   value: "jdbc:postgresql://REPLACE_WITH_DB_HOST:5432/dtrack"
            # - name: ALPINE_DATABASE_DRIVER
            #   value: "org.postgresql.Driver"
            # - name: ALPINE_DATABASE_USERNAME
            #   valueFrom:
            #     secretKeyRef:
            #       name: dependency-track-db
            #       key:  username
            # - name: ALPINE_DATABASE_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: dependency-track-db
            #       key:  password

          volumeMounts:
            - name: data
              mountPath: /data

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120   # Dependency Track takes 2+ min to start
            periodSeconds: 30
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false   # DT writes temp files to root FS
            capabilities:
              drop: [ALL]

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dependency-track-data
