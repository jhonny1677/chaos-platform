---
apiVersion: v1
kind: Namespace
metadata:
  name: falco
  labels:
    app.kubernetes.io/part-of: chaos-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco
  namespace: falco
  labels:
    app: falco
    app.kubernetes.io/part-of: chaos-platform

---
# Falco needs to read pod and namespace metadata from the K8s API to enrich
# security events with service names, namespaces, and labels.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco
  labels:
    app: falco
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - replicationcontrollers
      - services
      - endpoints
      - events
      - limitranges
      - resourcequotas
      - persistentvolumes
      - persistentvolumeclaims
      - serviceaccounts
      - configmaps
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  # Falco needs to read its own config secret if using Falco Sidekick with auth
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [falco-grpc-certs]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco
  labels:
    app: falco
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind:     ClusterRole
  name:     falco
subjects:
  - kind:      ServiceAccount
    name:      falco
    namespace: falco
