apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
    app.kubernetes.io/part-of: chaos-platform
spec:
  serviceName: vault-internal
  replicas: 1   # Single node for dev. Set to 3 for HA Raft in production.
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/v1/sys/metrics"
        prometheus.io/port:   "8200"
    spec:
      serviceAccountName: vault

      # Vault must run as non-root. UID 100 is the vault user in the official image.
      securityContext:
        runAsNonRoot: true
        runAsUser:    100
        fsGroup:      1000

      initContainers:
        # Fix Raft data directory permissions before Vault starts
        - name: init-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 100:1000 /vault/data /vault/logs"]
          volumeMounts:
            - name: data
              mountPath: /vault/data
            - name: logs
              mountPath: /vault/logs

      containers:
        - name: vault
          image: hashicorp/vault:1.15.4
          command: ["vault", "server", "-config=/vault/config/vault-config.hcl"]

          ports:
            - name: http
              containerPort: 8200
            - name: cluster
              containerPort: 8201

          resources:
            requests:
              cpu:    250m
              memory: 256Mi
            limits:
              cpu:    500m
              memory: 512Mi

          env:
            # Override api_addr with the pod's actual IP (required for Raft)
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_API_ADDR
              value: "http://$(POD_IP):8200"
            - name: VAULT_CLUSTER_ADDR
              value: "https://$(POD_IP):8201"
            - name: VAULT_LOG_LEVEL
              value: "info"
            - name: VAULT_LOG_FORMAT
              value: "json"

          volumeMounts:
            - name: config
              mountPath: /vault/config
              readOnly: true
            - name: data
              mountPath: /vault/data
            - name: logs
              mountPath: /vault/logs

          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
              port: 8200
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # IPC_LOCK allows Vault to prevent swap — prevents secrets being
              # written to disk in cleartext via memory swap.
              add: ["IPC_LOCK"]

      volumes:
        - name: config
          configMap:
            name: vault-config
        - name: logs
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: vault
      spec:
        accessModes:    [ReadWriteOnce]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
