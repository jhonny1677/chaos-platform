# wildcard-cert.yaml — Wildcard TLS certificate for all subdomains.
#
# A wildcard cert (*.example.com) covers all subdomains with a single cert,
# eliminating the need for per-service certificates. This is ideal for staging
# environments where subdomains change frequently.
#
# ⚠️  IMPORTANT: Wildcard certs REQUIRE DNS-01 challenge — HTTP-01 does not
#     support wildcards. DNS-01 works by creating a TXT record in your DNS zone.
#
# AWS Route53 DNS-01 setup (requires IRSA):
#   1. Create a Route53 IAM policy with ChangeResourceRecordSets permission
#   2. Attach to an IRSA role bound to the cert-manager service account
#   3. Configure the ClusterIssuer with route53 solver (see below)
#
# This example uses Route53. Adjust for your DNS provider
# (Cloudflare, Azure DNS, GCP Cloud DNS are also supported).

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-chaos-platform-tls
  namespace: ingress-nginx    # must be in the same namespace as the Secret consumer
  labels:
    app.kubernetes.io/part-of: chaos-platform
spec:
  secretName: wildcard-chaos-platform-tls
  duration:    2160h
  renewBefore: 720h

  subject:
    organizations: [chaos-platform]

  dnsNames:
    - "*.REPLACE_WITH_YOUR_DOMAIN"         # covers all subdomains
    - "REPLACE_WITH_YOUR_DOMAIN"           # also covers the apex domain

  privateKey:
    algorithm:      ECDSA
    size:           256
    rotationPolicy: Always

  issuerRef:
    # DNS-01 ClusterIssuer — requires Route53 credentials
    # Configure this issuer separately with:
    #   apiVersion: cert-manager.io/v1
    #   kind: ClusterIssuer
    #   metadata:
    #     name: letsencrypt-prod-dns01
    #   spec:
    #     acme:
    #       server: https://acme-v02.api.letsencrypt.org/directory
    #       email: REPLACE_WITH_YOUR_EMAIL
    #       privateKeySecretRef:
    #         name: letsencrypt-prod-dns01-account-key
    #       solvers:
    #         - dns01:
    #             route53:
    #               region: REPLACE_WITH_AWS_REGION
    #               hostedZoneID: REPLACE_WITH_ROUTE53_HOSTED_ZONE_ID
    #               # IRSA annotation on cert-manager SA provides credentials
    name:  letsencrypt-prod-dns01   # REPLACE if using a different DNS issuer
    kind:  ClusterIssuer
    group: cert-manager.io

  usages:
    - server auth
    - digital signature
    - key encipherment
