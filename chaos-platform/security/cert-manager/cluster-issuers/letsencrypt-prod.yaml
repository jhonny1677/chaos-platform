# letsencrypt-prod.yaml — Let's Encrypt PRODUCTION issuer.
#
# Certificates from this issuer are trusted by all major browsers and clients.
# Use only after verifying that staging certificates work correctly.
#
# ⚠️  RATE LIMITS (as of 2024):
#   - 50 certificates per registered domain per week
#   - 5 duplicate certificates per week
#   - 300 new orders per 3 hours
#   - Rate limit errors are NOT recoverable within the window — plan carefully
#
# If you hit rate limits: use letsencrypt-staging until the window resets.
#
# DNS requirements:
#   - The domain must have a public A/CNAME record pointing to the Ingress IP
#   - Port 80 must be reachable from the Internet for HTTP-01 challenge
#   - For wildcard certs, use DNS-01 challenge instead (not configured here)

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/part-of: chaos-platform
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: REPLACE_WITH_YOUR_EMAIL
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
