# letsencrypt-staging.yaml — Let's Encrypt STAGING issuer.
#
# Use staging for all testing and development. The staging CA issues
# certificates that are NOT trusted by browsers (intentional — prevents
# you from burning your production rate limits during testing).
#
# Rate limits on staging are much more generous than production:
#   - 1500 certificate requests per 3 hours (production: 50/week per domain)
#
# When staging certificates work, switch to letsencrypt-prod.yaml.
#
# ACME HTTP-01 challenge: Let's Encrypt sends an HTTP request to
# http://<your-domain>/.well-known/acme-challenge/<token>
# The cert-manager HTTP-01 solver handles this automatically by creating a
# temporary pod and Service. Requires the domain to be publicly accessible.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/part-of: chaos-platform
spec:
  acme:
    # Let's Encrypt STAGING endpoint — certificates not trusted by browsers
    server: https://acme-staging-v02.api.letsencrypt.org/directory

    # ACME registration email — Let's Encrypt sends expiry warnings here
    email: REPLACE_WITH_YOUR_EMAIL   # e.g. ops@yourcompany.com

    # Private key for the ACME account — auto-generated by cert-manager on first use.
    # DO NOT delete this secret — it's your account identity with Let's Encrypt.
    privateKeySecretRef:
      name: letsencrypt-staging-account-key

    solvers:
      # HTTP-01 via nginx Ingress class — the recommended approach for EKS
      - http01:
          ingress:
            class: nginx   # matches ingressClassName in Ingress resources
