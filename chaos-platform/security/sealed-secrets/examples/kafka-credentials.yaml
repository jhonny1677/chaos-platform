# kafka-credentials.yaml — Example SealedSecret for Kafka SASL credentials.
#
# The Chaos Engine and Load Tester both connect to Kafka using SASL/SCRAM-SHA-512.
# These credentials allow them to publish to chaos-events and consume from it.
#
# IMPORTANT: The Kafka SASL user must already exist in your MSK/Kafka cluster.
# Create it via the MSK console or with:
#   kafka-configs.sh --bootstrap-server <broker> \
#     --alter --add-config 'SCRAM-SHA-512=[iterations=8192,password=<password>]' \
#     --entity-type users --entity-name chaos-engine
#
# How to regenerate:
#   kubectl create secret generic kafka-credentials \
#     --namespace chaos-engine \
#     --from-literal=bootstrap-servers=REPLACE_WITH_MSK_BOOTSTRAP \
#     --from-literal=username=REPLACE_WITH_KAFKA_USER \
#     --from-literal=password=REPLACE_WITH_KAFKA_PASSWORD \
#     --from-literal=sasl-mechanism=SCRAM-SHA-512 \
#     --from-literal=security-protocol=SASL_SSL \
#     --dry-run=client -o yaml | kubeseal --format=yaml > kafka-credentials.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kafka-credentials
  namespace: chaos-engine
  labels:
    app.kubernetes.io/part-of: chaos-platform
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    bootstrap-servers: PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    username:          PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    password:          PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    sasl-mechanism:    PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    security-protocol: PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
  template:
    metadata:
      name:      kafka-credentials
      namespace: chaos-engine
      labels:
        app:                          chaos-engine
        app.kubernetes.io/part-of:    chaos-platform
    type: Opaque
