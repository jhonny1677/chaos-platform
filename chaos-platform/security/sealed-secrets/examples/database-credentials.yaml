# database-credentials.yaml — Example SealedSecret for PostgreSQL credentials.
#
# This file is SAFE TO COMMIT to git. The encrypted blob can only be decrypted
# by the Sealed Secrets controller running in your specific cluster — possession
# of this file alone is useless without the cluster's private key.
#
# How to regenerate this file:
#   1. Create a regular K8s Secret (do NOT commit this):
#      kubectl create secret generic db-credentials \
#        --namespace chaos-engine \
#        --from-literal=username=REPLACE_WITH_DB_USERNAME \
#        --from-literal=password=REPLACE_WITH_DB_PASSWORD \
#        --from-literal=host=REPLACE_WITH_DB_HOST \
#        --from-literal=port=5432 \
#        --from-literal=database=REPLACE_WITH_DB_NAME \
#        --dry-run=client -o yaml > /tmp/db-credentials.yaml
#
#   2. Seal it (requires kubeseal + running Sealed Secrets controller):
#      kubeseal --format=yaml < /tmp/db-credentials.yaml > database-credentials.yaml
#
#   3. Delete the plaintext file:
#      rm /tmp/db-credentials.yaml
#
#   4. Commit this file:
#      git add security/sealed-secrets/examples/database-credentials.yaml
#
# ⚠️  The encryptedData values below are PLACEHOLDERS.
#     Run the steps above to generate real encrypted values for your cluster.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-credentials
  namespace: chaos-engine
  labels:
    app.kubernetes.io/part-of: chaos-platform
  annotations:
    # sealedsecrets.bitnami.com/cluster-wide: "true"    # uncomment for cross-ns access
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    username: PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    password: PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    host:     PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    port:     PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
    database: PLACEHOLDER_ENCRYPT_WITH_KUBESEAL_REPLACE_ME
  template:
    metadata:
      name:      db-credentials
      namespace: chaos-engine
      labels:
        app:                          chaos-engine
        app.kubernetes.io/part-of:    chaos-platform
    type: Opaque
