---
# ── Grafana: allow UI access from ingress controller ─────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: monitoring
  annotations:
    description: "Allow ingress controller and users to reach Grafana and AlertManager"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
