# ── argocd ───────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: chaos-platform
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # ArgoCD must reach GitHub to pull manifests
    - ports:
        - port: 443
          protocol: TCP
        - port: 22
          protocol: TCP

