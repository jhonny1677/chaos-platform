# =============================================================================
# RESOURCE QUOTA + LIMIT RANGE — load-tester namespace
#
# Load-tester is the most resource-hungry namespace: it can spin up 50 worker
# pods simultaneously when simulating peak traffic. The higher CPU/memory
# ceiling (8 CPU / 16Gi) reflects this bursty workload pattern.
# KEDA will scale workers up to the pod limit of 50 based on Kafka lag.
# =============================================================================

apiVersion: v1
kind: ResourceQuota
metadata:
  name: load-tester-quota
  namespace: load-tester
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: load-tester
  annotations:
    description: "Hard resource ceiling for the load-tester namespace"
spec:
  hard:
    # Compute — generous because KEDA can spin up many short-lived workers
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"

    # Workloads — 50 pods supports high-concurrency load scenarios
    pods: "50"
    count/deployments.apps: "10"
    count/jobs.batch: "20"
    count/cronjobs.batch: "5"

    # Storage
    requests.storage: "20Gi"
    persistentvolumeclaims: "5"

    # Services
    services: "15"
    services.loadbalancers: "1"    # one external LB for the load-tester UI
    services.nodeports: "0"

    # Config
    count/configmaps: "20"
    count/secrets: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: load-tester-limits
  namespace: load-tester
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: load-tester
  annotations:
    description: "Default resource requests and limits for pods in load-tester"
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "1"
        memory: "2Gi"
      min:
        cpu: "50m"
        memory: "64Mi"

    - type: Pod
      max:
        cpu: "2"
        memory: "4Gi"
