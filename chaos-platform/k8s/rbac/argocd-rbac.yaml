# =============================================================================
# RBAC — ArgoCD
#
# ArgoCD is a GitOps controller that reconciles the entire cluster state.
# It needs broad write access so it can create/update/delete any resource
# that appears in the Git repository. This is the standard ArgoCD permission
# set — the security boundary is Git, not RBAC.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-sa
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: gitops
  annotations:
    description: "Service account for ArgoCD application controller"
automountServiceAccountToken: true

---
# ArgoCD needs cluster-wide permissions to manage resources in any namespace.
# Restrict verbs to what ArgoCD actually needs — no node deletion, no RBAC writes
# (ArgoCD doesn't manage its own RBAC resources).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-role
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: gitops
  annotations:
    description: "Full lifecycle access to workload resources across all namespaces"
rules:
  # Core workload resources
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
      - configmaps
      - secrets
      - serviceaccounts
      - persistentvolumeclaims
      - namespaces
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Apps workloads
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Ingress and networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Batch jobs (for chaos experiment jobs)
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Custom resources (cert-manager, KEDA, etc.)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # Status subresource for health checks
  - apiGroups: ["apps"]
    resources: ["deployments/status", "statefulsets/status"]
    verbs: ["get"]

  # Events — ArgoCD writes sync events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-binding
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-role
subjects:
  - kind: ServiceAccount
    name: argocd-sa
    namespace: argocd
