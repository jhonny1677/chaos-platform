# =============================================================================
# RBAC — load-tester
#
# The load tester only needs visibility within its own namespace.
# Using a namespace-scoped Role (not ClusterRole) enforces least-privilege —
# load-tester workers have no business reading pods in other namespaces.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: load-tester-sa
  namespace: load-tester
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: load-tester
  annotations:
    description: "Service account for load-tester workers; namespace-scoped only"
automountServiceAccountToken: true

---
# Namespace-scoped Role — load-tester can only see its own namespace resources.
# It reads pod/deployment status to scale workers intelligently via KEDA.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: load-tester-role
  namespace: load-tester
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: load-tester
  annotations:
    description: "Read-only access to pods and deployments within load-tester namespace"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]

  # ConfigMaps — load-tester reads its own config for target URLs and rates
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: load-tester-binding
  namespace: load-tester
  labels:
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: load-tester
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: load-tester-role
subjects:
  - kind: ServiceAccount
    name: load-tester-sa
    namespace: load-tester
