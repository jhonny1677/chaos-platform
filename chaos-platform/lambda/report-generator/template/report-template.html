<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos Platform Report — {{EXPERIMENT_ID}}</title>
  <style>
    /* Reset and base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #111827;
      color: #e5e7eb;
      font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 0;
    }

    /* Page wrapper */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #111827 100%);
      border-bottom: 3px solid #3b82f6;
      padding: 40px 48px 32px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .brand-icon {
      width: 40px;
      height: 40px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }
    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: #93c5fd;
      letter-spacing: 0.5px;
    }
    .brand-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
    .report-title {
      font-size: 28px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
    }
    .report-id {
      font-size: 13px;
      color: #6b7280;
      font-family: 'Monaco', 'Courier New', monospace;
    }
    .status-badge {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 20px;
      border-radius: 100px;
      background-color: {{STATUS_COLOR}};
      color: white;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .generated-at {
      margin-top: 12px;
      font-size: 12px;
      color: #4b5563;
    }

    /* Content area */
    .content {
      padding: 32px 48px;
    }

    /* Footer */
    .footer {
      background: #0f172a;
      border-top: 1px solid #1f2937;
      padding: 24px 48px;
      text-align: center;
      font-size: 12px;
      color: #4b5563;
    }
    .footer a {
      color: #3b82f6;
      text-decoration: none;
    }

    /* Tables */
    table { border-collapse: collapse; width: 100%; }
    th { text-align: left; }

    /* Code blocks */
    code {
      font-family: 'Monaco', 'Courier New', monospace;
      background: #0f172a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #93c5fd;
    }

    /* Print / PDF */
    @media print {
      body { background: #111827; }
      .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-brand">
        <div class="brand-icon">⚡</div>
        <div>
          <div class="brand-name">CHAOS PLATFORM</div>
          <div class="brand-sub">Chaos Engineering &amp; Load Testing</div>
        </div>
      </div>
      <div class="report-title">Experiment Report</div>
      <div class="report-id">ID: {{EXPERIMENT_ID}}</div>
      <div class="status-badge">{{STATUS_TEXT}}</div>
      <div class="generated-at">Generated: {{GENERATED_AT}}</div>
    </div>

    <!-- Report body (injected by report_builder.py) -->
    <div class="content">
      {{REPORT_BODY}}
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Generated by <strong>Chaos Platform</strong> — Automated Resilience Testing</p>
      <p style="margin-top:4px;">This report is confidential. Presigned URL expires in 7 days.</p>
    </div>

  </div>
</body>
</html>
