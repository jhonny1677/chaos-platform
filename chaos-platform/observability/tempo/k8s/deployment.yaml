apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring
  labels:
    app: tempo
    app.kubernetes.io/part-of: chaos-platform
spec:
  # Single replica for dev — Tempo local storage is not HA
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3200"
        prometheus.io/path:   "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    10001
        fsGroup:      10001

      containers:
        - name: tempo
          image: grafana/tempo:2.4.0
          args:
            - -config.file=/conf/tempo-config.yaml
            - -config.expand-env=true
          ports:
            - name: http
              containerPort: 3200
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: grpc
              containerPort: 9095

          resources:
            requests:
              cpu:    200m
              memory: 256Mi
            limits:
              cpu:    "1"
              memory: 1Gi

          env:
            - name: AWS_REGION
              value: us-east-1
            # SECRET_REF: TEMPO_S3_BUCKET from ConfigMap (only needed for S3 backend)
            - name: TEMPO_S3_BUCKET
              value: "REPLACE_WITH_TEMPO_S3_BUCKET"

          volumeMounts:
            - name: config
              mountPath: /conf
            - name: storage
              mountPath: /var/tempo

          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5

      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: storage
          persistentVolumeClaim:
            claimName: tempo-storage

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
  labels:
    app: tempo
data:
  tempo-config.yaml: |
    server:
      http_listen_port: 3200
      log_level: info
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
      trace_idle_period: 10s
    compactor:
      compaction:
        block_retention: 72h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    search_enabled: true
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
      processors:
        - service-graphs
        - span-metrics
    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics
