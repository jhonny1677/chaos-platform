apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  # ── Prometheus ────────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus-operated.monitoring:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod:          POST
      timeInterval:        15s
      exemplarTraceIdDestinations:
        # Link Prometheus exemplars to Tempo traces
        - name: traceID
          datasourceUid: tempo

  # ── Loki ─────────────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki.monitoring:3100
    editable: false
    jsonData:
      derivedFields:
        # Extract traceId from log lines and link to Tempo
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "Open in Tempo"

  # ── Tempo ─────────────────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo.monitoring:3200
    editable: false
    jsonData:
      tracesToLogs:
        # Trace → Logs: jump from a trace span to the relevant Loki logs
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        mapTagNamesEnabled: true
        mappedTags:
          - key: service.name
            value: service
      tracesToMetrics:
        # Trace → Metrics: link to Prometheus for span error rates
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request rate
            query: sum(rate(http_requests_total{service="$${__tags.service}"}[5m]))
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
