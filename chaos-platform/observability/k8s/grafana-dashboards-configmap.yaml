# Grafana dashboard ConfigMap.
#
# Grafana's dashboard provisioner (configured in dashboard-provisioning.yaml)
# reads JSON files mounted from this ConfigMap. The dashboards are baked into
# the ConfigMap so they are available immediately on pod startup without
# waiting for a git clone or sidecar.
#
# This file is generated by CI. Do not edit manually — edit the source JSON
# files under observability/grafana/dashboards/ and re-run:
#   kubectl create configmap grafana-dashboards \
#     --from-file=observability/grafana/dashboards/ \
#     -n monitoring --dry-run=client -o yaml > \
#     observability/k8s/grafana-dashboards-configmap.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: chaos-platform
  annotations:
    # Grafana sidecar watches ConfigMaps with this label and loads them automatically
    k8s-sidecar-target-directory: /var/lib/grafana/dashboards/chaos-platform
data:
  # Dashboard JSON files are injected here by CI using kubectl create configmap.
  # The placeholder below shows the expected structure.
  #
  # chaos-platform-overview.json: |
  #   { "title": "Chaos Platform Overview", ... }
  #
  # chaos-experiment-detail.json: |
  #   { "title": "Chaos Experiment Detail", ... }
  #
  # load-test-results.json: |
  #   { "title": "Load Test Results", ... }
  #
  # target-app-health.json: |
  #   { "title": "Target App Health", ... }
  #
  # kubernetes-cluster.json: |
  #   { "title": "Kubernetes Cluster", ... }
  #
  # slo-dashboard.json: |
  #   { "title": "SLO Dashboard", ... }
  _placeholder: |
    Run: kubectl create configmap grafana-dashboards \
      --from-file=observability/grafana/dashboards/ \
      -n monitoring --dry-run=client -o yaml | kubectl apply -f -
