# OpenTelemetry Collector configuration for the Chaos Platform.
#
# Pipeline overview:
#   Traces:  OTLP → batch → Tempo
#   Metrics: OTLP + Prometheus scrape → batch → Prometheus remote-write
#   Logs:    OTLP → batch → Loki
#
# The collector runs as a Deployment (2 replicas) rather than a DaemonSet
# because our services ship OTLP directly — we don't need node-level
# log tail access (that's Promtail's job).

receivers:
  # ── OTLP: receives traces, metrics, and logs from our services ────────────
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://dashboard.chaos-platform.local"
            - "http://localhost:3001"

  # ── Prometheus receiver: scrape the collector's own metrics ───────────────
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector-self
          scrape_interval: 30s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  # ── Memory limiter: must be first to prevent OOM crashes ─────────────────
  # Soft limit at 80% of max; hard limit at max. At soft limit it drops
  # non-essential data rather than letting the process crash.
  memory_limiter:
    check_interval:         5s
    limit_mib:              400
    spike_limit_mib:        100

  # ── Batch: reduces number of export calls, improves throughput ────────────
  # Sends every 5 seconds OR when 512 items accumulate, whichever comes first.
  batch:
    timeout:          5s
    send_batch_size:  512
    send_batch_max_size: 1024

  # ── Resource detection: adds K8s metadata to every signal ────────────────
  # Detects: cluster name, node name, pod name, namespace, container name
  resourcedetection:
    detectors: [env, k8snode]
    timeout:   5s
    override:  false

  # ── K8s attributes: enriches with pod metadata from the K8s API ──────────
  k8sattributes:
    auth_type:   serviceAccount
    passthrough: false
    filter:
      node_from_env_var: KUBE_NODE_NAME
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.start_time
      labels:
        - tag_name: app.label.service
          key:      app
          from:     pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: connection

exporters:
  # ── Prometheus: exposes metrics for Prometheus to scrape ─────────────────
  # Prometheus server scrapes this endpoint at :8889/metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otel
    resource_to_telemetry_conversion:
      enabled: true

  # ── Loki: sends log data ──────────────────────────────────────────────────
  loki:
    endpoint: http://loki.monitoring:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true
    labels:
      attributes:
        service.name: service
        k8s.namespace.name: namespace
        k8s.pod.name: pod
        level: level

  # ── Tempo: sends trace data ───────────────────────────────────────────────
  otlp/tempo:
    endpoint: http://tempo.monitoring:4317
    tls:
      insecure: true

  # ── Logging: debug-only, prints to stdout ────────────────────────────────
  # Disable in production to avoid log noise.
  logging:
    verbosity:         detailed
    sampling_initial:  5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  telemetry:
    logs:
      level: info
    metrics:
      level:   detailed
      address: 0.0.0.0:8888

  pipelines:
    # ── Traces ───────────────────────────────────────────────────────────────
    traces:
      receivers:   [otlp]
      processors:  [memory_limiter, resourcedetection, k8sattributes, batch]
      exporters:   [otlp/tempo, logging]

    # ── Metrics ──────────────────────────────────────────────────────────────
    metrics:
      receivers:   [otlp, prometheus]
      processors:  [memory_limiter, resourcedetection, k8sattributes, batch]
      exporters:   [prometheus]

    # ── Logs ─────────────────────────────────────────────────────────────────
    logs:
      receivers:   [otlp]
      processors:  [memory_limiter, resourcedetection, k8sattributes, batch]
      exporters:   [loki]
