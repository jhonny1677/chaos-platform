# =============================================================================
# ConfigMap — target-app environment configuration
#
# All non-secret configuration lives here. Secrets (DB password, etc.) are
# injected by external-secrets from AWS Secrets Manager and mounted as a
# Kubernetes Secret referenced in the deployment's envFrom block.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: target-app-config
  namespace: target-app
  labels:
    app: target-app
    app.kubernetes.io/part-of: chaos-platform
    app.kubernetes.io/component: target-app
  annotations:
    description: "Non-secret environment variables for the target-app pods"
data:
  APP_NAME: "target-app"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "dev"
  LOG_LEVEL: "INFO"

  # Database — password injected from the target-app-secrets Secret
  # SECRET_REF: DATABASE_URL includes the password from AWS Secrets Manager
  # Format: postgresql+asyncpg://<user>:<password>@<host>:<port>/<db>
  DATABASE_URL: "postgresql+asyncpg://chaos:REPLACE_WITH_DB_PASSWORD@postgres.chaos-engine.svc.cluster.local:5432/chaos_platform"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "5"
  DB_ECHO: "false"

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "target-app"

  # Streaming
  KAFKA_BOOTSTRAP: "kafka-broker.kafka.svc.cluster.local:9092"

  # CORS — restrict to frontend origin in prod
  CORS_ORIGINS: "*"
