apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-engine-config
  namespace: chaos-engine
  labels:
    app: chaos-engine
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "dev"
  APP_VERSION: "1.0.0"
  PROMETHEUS_URL: "http://prometheus-kube-prometheus-prometheus.monitoring:9090"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka:9092"
  KAFKA_TOPIC: "chaos-events"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  DB_POOL_SIZE: "5"
  DB_ECHO: "false"
  CORS_ORIGINS: "*"
